name: Build digests

on:
  schedule:
    # 03:00 UTC = 05:00 in Poland during summer time (04:00 in winter).
    - cron: "0 3 * * 1-6"   # Mon–Fri = REVEILLE, Saturday = DEFILADE
  workflow_dispatch:        # lets you run it manually from the Actions tab
    inputs:
      digest:
        description: "Which digest to build"
        type: choice
        options: [reveille, defilade]
        default: reveille

permissions:
  contents: write

concurrency:
  group: digests
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide which digest to build
        id: which
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.digest }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "6" ]; then
            echo "type=defilade" >> "$GITHUB_OUTPUT"
          else
            echo "type=reveille" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/build_digest.py --type "${{ steps.which.outputs.type }}"

      - name: Commit and publish the issue
        run: |
          git config user.name "Dispatches bot"
          git config user.email "bot@dispatches.local"
          git add -A
          git diff --cached --quiet && echo "Nothing to publish" && exit 0
          git commit -m "${{ steps.which.outputs.type }} $(date -u +%F)"
          git push
